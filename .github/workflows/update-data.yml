name: Update exoplanet data

# Runs every Monday, and can also be started by hand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild index.html from the latest NASA data
        run: npm run build

      - name: Check that the page still works
        run: npm test

      - name: Commit the refreshed data if it changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No change in the data."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Refresh exoplanet data ($(date -u +%Y-%m-%d))"
            git push
          fi
